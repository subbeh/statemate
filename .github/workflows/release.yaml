name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Prepare latest release assets
        run: |
          mkdir -p latest
          for f in dist/*.tar.gz; do
            # statemate_1.0.0_linux_amd64.tar.gz -> mate_linux_amd64.tar.gz
            name=$(basename "$f" | sed 's/statemate_[^_]*_/mate_/')
            cp "$f" "latest/$name"
          done
          cp dist/checksums.txt latest/

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: |
            This release always points to the most recent stable version.

            Current version: ${{ github.ref_name }}
          files: latest/*
          prerelease: false
          make_latest: false
